{% extends 'base.html' %}
{% load i18n crispy_forms_tags %}

{% block title %}{% trans "Login" %} - Finanzplan{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{% trans "Login" %}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100">{% trans "Login" %}</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'signup' %}">{% trans "No account yet? Sign up" %}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load i18n crispy_forms_tags %}

{% block title %}{% trans "Sign Up" %} - Finanzplan{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">{% trans "Sign Up" %}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success w-100">{% trans "Sign Up" %}</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'login' %}">{% trans "Already have an account? Login" %}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% load i18n humanize %}
<div x-data="{ 
    colFilters: { name: '', cat: '' },
    items: [],
    collapsedGroups: {},
    init() {
        const scriptTag = document.getElementById('{{ widget_id }}');
        if (scriptTag) {
            try {
                const data = JSON.parse(scriptTag.textContent);
                this.items = Array.isArray(data) ? data : [];
            } catch (e) {
                console.error('Error parsing dates data:', e);
                this.items = [];
            }
        }
    },
    get groupedItems() {
        if (!this.items) return [];
        
        // 1. Filter
        const filtered = this.items.filter(i => {
            const n = (i.name || '').toLowerCase();
            const f_n = (this.colFilters.name || '').toLowerCase();
            if (f_n && !n.includes(f_n)) return false;

            const c = (i.category || '').toLowerCase();
            const f_c = (this.colFilters.cat || '').toLowerCase();
            if (f_c && !c.includes(f_c)) return false;

            return true;
        });

        // 2. Group
        const groupsMap = {};
        filtered.forEach(item => {
            if (!groupsMap[item.category]) {
                groupsMap[item.category] = {
                    name: item.category,
                    items: [],
                    maxStatus: 'info',
                    earliestDate: '9999-99-99'
                };
            }
            groupsMap[item.category].items.push(item);
            
            // Track priority: urgent/danger > warning > info
            const s = item.status;
            if (s === 'danger' || s === 'urgent') groupsMap[item.category].maxStatus = 'danger';
            else if (s === 'warning' && groupsMap[item.category].maxStatus !== 'danger') groupsMap[item.category].maxStatus = 'warning';
            
            const iso = item.date.split('.').reverse().join('-');
            if (iso < groupsMap[item.category].earliestDate) {
                groupsMap[item.category].earliestDate = iso;
            }
        });

        // 3. Sort Groups (Priority then Date)
        return Object.values(groupsMap).sort((a, b) => {
            const p = { 'danger': 0, 'warning': 1, 'info': 2 };
            if (p[a.maxStatus] !== p[b.maxStatus]) return p[a.maxStatus] - p[b.maxStatus];
            return a.earliestDate.localeCompare(b.earliestDate);
        }).map(g => {
            // Sort items within group by date
            g.items.sort((a, b) => {
                const da = a.date.split('.').reverse().join('-');
                const db = b.date.split('.').reverse().join('-');
                return da.localeCompare(db);
            });
            return g;
        });
    }
}" class="h-100 d-flex flex-column" x-init="init()" style="background-color: var(--app-table-body-bg) !important;">
    
    <div class="flex-grow-1 overflow-auto px-0" style="background-color: var(--app-table-body-bg) !important;">
        <table class="table table-sm table-hover align-middle mb-0" 
               style="font-size: 0.82rem; border-color: var(--app-table-border-color) !important; --bs-table-bg: var(--app-table-body-bg); --bs-table-color: var(--app-table-body-text);">
            <thead class="sticky-top" style="z-index: 10;">
                <tr class="text-uppercase" style="font-size: 0.65rem;">
                    <th class="py-2 px-3 border-0" style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important; width: 120px;">
                        {% trans 'Date' %}
                    </th>
                    <th class="py-2 px-3 border-0" style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        {% trans 'Event' %}
                    </th>
                    <th class="py-2 px-3 border-0 text-end" style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important; width: 40px;">
                    </th>
                </tr>
            </thead>

            <template x-for="(group, gIdx) in groupedItems" :key="group.name">
                <tbody class="border-0" style="border-top: 1px solid var(--app-table-border-color) !important;">
                    <!-- Group Header -->
                    <tr class="cursor-pointer" @click="collapsedGroups[group.name] = !collapsedGroups[group.name]"
                        :class="{
                            'bg-danger bg-opacity-25': group.maxStatus === 'danger',
                            'bg-warning bg-opacity-10': group.maxStatus === 'warning',
                            'bg-light bg-opacity-10': group.maxStatus === 'info'
                        }" style="border-bottom: 1px solid var(--app-table-border-color) !important;">
                        <td colspan="2" class="py-2 px-3 fw-bold">
                            <i class="bi me-2" :class="collapsedGroups[group.name] ? 'bi-chevron-right' : 'bi-chevron-down'"></i>
                            <span x-text="group.name"></span>
                            <span class="badge rounded-pill ms-2" 
                                    :class="group.maxStatus === 'danger' ? 'bg-danger' : (group.maxStatus === 'warning' ? 'bg-warning text-dark' : 'bg-secondary')"
                                    x-text="group.items.length"></span>
                        </td>
                        <td class="text-end px-3">
                            <i x-show="group.maxStatus === 'danger'" class="bi bi-exclamation-triangle-fill text-danger"></i>
                        </td>
                    </tr>
                    <!-- Group Items -->
                    <template x-if="!collapsedGroups[group.name]">
                        <template x-for="(item, iIdx) in group.items" :key="iIdx">
                            <tr :class="{
                                'table-danger': item.status === 'danger' || item.status === 'urgent',
                                'table-warning': item.status === 'warning'
                            }" style="border-bottom: 1px solid var(--app-table-border-color) !important;">
                                <td class="py-2 px-3 border-0 font-monospace fw-bold ps-4" x-text="item.date"></td>
                                <td class="py-2 px-3 border-0" colspan="2">
                                    <i class="bi me-1" :class="{
                                        'bi-exclamation-triangle-fill text-danger': item.status === 'danger' || item.status === 'urgent',
                                        'bi-exclamation-circle-fill text-warning': item.status === 'warning',
                                        'bi-info-circle text-info': item.status === 'info'
                                    }"></i>
                                    <span x-text="item.name"></span>
                                </td>
                            </tr>
                        </template>
                    </template>
                </tbody>
            </template>
            
            <template x-if="items.length === 0">
                <tbody style="border-top: 1px solid var(--app-table-border-color) !important;">
                    <tr>
                        <td colspan="3" class="py-4 text-center opacity-50 italic">
                            {% trans 'No upcoming important dates.' %}
                        </td>
                    </tr>
                </tbody>
            </template>

        </table>
    </div>
</div>

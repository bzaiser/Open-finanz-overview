{% load i18n humanize %}
<div x-data="{ 
    colFilters: { name: '', provider: '', year: '' },
    sortCol: 'current_balance', 
    sortDir: 'desc',
    items: [],
    init() {
        const scriptTag = document.getElementById('{{ widget_id }}');
        if (scriptTag) {
            try {
                this.items = JSON.parse(scriptTag.textContent);
            } catch (e) {
                console.error('Error parsing loan table data:', e);
            }
        }
    },
    get filteredItems() {
        if (!this.items) return [];
        return this.items.filter(i => {
            if (this.colFilters.name && !(i.name || '').toLowerCase().includes(this.colFilters.name.toLowerCase())) return false;
            if (this.colFilters.provider && !(i.provider || '').toLowerCase().includes(this.colFilters.provider.toLowerCase())) return false;
            if (this.colFilters.year && !(i.year || '').toLowerCase().includes(this.colFilters.year.toLowerCase())) return false;
            return true;
        }).sort((a, b) => {
            let va = a[this.sortCol];
            let vb = b[this.sortCol];
            if (typeof va === 'string') {
                va = va.toLowerCase();
                vb = vb.toLowerCase();
            }
            if (va < vb) return this.sortDir === 'asc' ? -1 : 1;
            if (va > vb) return this.sortDir === 'asc' ? 1 : -1;
            return 0;
        });
    },
    get totalBalance() {
        return this.filteredItems.reduce((sum, i) => sum + (parseFloat(i.current_balance) || 0), 0);
    },
    get totalInterest() {
        return this.filteredItems.reduce((sum, i) => sum + (parseFloat(i.total_interest) || 0), 0);
    }
}" class="h-100 d-flex flex-column" x-init="init()" style="background-color: var(--app-table-body-bg) !important;">
    
    <div class="flex-grow-1 overflow-auto px-0" style="background-color: var(--app-table-body-bg) !important;">
        <table class="table table-sm table-hover align-middle mb-0" 
               style="font-size: 0.82rem; border-color: var(--app-table-border-color) !important; --bs-table-bg: var(--app-table-body-bg); --bs-table-color: var(--app-table-body-text);">
            <thead class="sticky-top" style="z-index: 10;">
                <tr class="text-uppercase" style="font-size: 0.65rem;">
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'name'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Kredit Name' %}</span>
                            <i class="bi" :class="sortCol === 'name' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'provider'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Anbieter' %}</span>
                            <i class="bi" :class="sortCol === 'provider' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'interest_rate'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Zins' %}</span>
                            <i class="bi" :class="sortCol === 'interest_rate' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 text-end cursor-pointer" @click="sortCol = 'current_balance'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-end">
                            <span class="me-2">{% trans 'Saldo' %}</span>
                            <i class="bi" :class="sortCol === 'current_balance' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 text-end cursor-pointer" @click="sortCol = 'monthly_payment'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-end">
                            <span class="me-2">{% trans 'Rate' %}</span>
                            <i class="bi" :class="sortCol === 'monthly_payment' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                </tr>
                <!-- Inline Filters -->
                <tr>
                    <td class="p-1 px-3 border-0" style="background-color: var(--app-table-filter-bg) !important;">
                        <input type="text" x-model="colFilters.name" class="form-control form-control-sm border-0 bg-white bg-opacity-10 text-white" style="font-size: 0.75rem;" placeholder="Filter...">
                    </td>
                    <td class="p-1 border-0" style="background-color: var(--app-table-filter-bg) !important;">
                        <input type="text" x-model="colFilters.provider" class="form-control form-control-sm border-0 bg-white bg-opacity-10 text-white" style="font-size: 0.75rem;" placeholder="Filter...">
                    </td>
                    <td class="p-1 px-3 border-0" colspan="3" style="background-color: var(--app-table-filter-bg) !important;"></td>
                </tr>
            </thead>
            <tbody style="border-top: 1px solid var(--app-table-border-color) !important;">
                <template x-for="(item, index) in filteredItems" :key="index">
                    <tr>
                        <td class="py-2 px-3 border-0">
                            <span class="fw-bold d-block" x-text="item.name"></span>
                            <span class="small opacity-75" x-text="item.type_display"></span>
                        </td>
                        <td class="py-2 px-3 border-0" x-text="item.provider"></td>
                        <td class="py-2 px-3 border-0 font-monospace text-center" x-text="parseFloat(item.interest_rate).toFixed(2) + '%'"></td>
                        <td class="py-2 px-3 border-0 text-end font-monospace fw-bold text-danger" 
                            x-text="(item.current_balance || 0).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' })">
                        </td>
                        <td class="py-2 px-3 border-0 text-end font-monospace" 
                            x-text="(item.monthly_payment || 0).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' })">
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- Summary Footer -->
    <div class="p-3 d-flex justify-content-between align-items-center" 
         style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important; border-top-color: var(--app-table-border-color) !important; font-size: 0.8rem;">
        <div class="d-flex gap-4">
            <span class="small opacity-75 text-uppercase fw-bold">
                {% trans 'Kredite' %}: <span class="text-white" x-text="filteredItems.length"></span>
            </span>
            <span class="small opacity-75 text-uppercase fw-bold">
                {% trans 'Zinsen' %}: <span class="text-white" x-text="totalInterest.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' })"></span>
            </span>
        </div>
        <div>
            <span class="small opacity-75 text-uppercase fw-bold me-2">{% trans 'Gesaumtschulden' %}:</span>
            <span class="fs-5 fw-bold font-monospace text-danger" x-text="totalBalance.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' })"></span>
        </div>
    </div>
</div>

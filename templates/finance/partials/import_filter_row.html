{% load i18n %}
<tr id="filter-row-{{ f.id }}" 
    class="transition-row animate__animated animate__fadeIn"
    {% if hx_pob %}hx-swap-oob="outerHTML:#filter-row-{{ f.id }}"{% endif %}>
    <td class="fw-bold">{{ f.target_name }}</td>
    <td><code class="small text-primary">{{ f.search_query }}</code></td>
    <td>
        {% if f.category %}
        <span class="badge rounded-pill badge-category" 
              style="--cat-color: {{ f.category.color }};">
            {{ f.category.name }}
        </span>
        {% endif %}
        {% if f.linked_cash_flow %}
        <div class="small text-primary mt-1" title="{% trans 'Verknüpft mit Finanzplan' %}">
            <i class="bi bi-link-45deg"></i> {{ f.linked_cash_flow.name }}
        </div>
        {% endif %}
    </td>
    <td class="text-end">
        <div class="btn-group">
            <button class="btn btn-link text-primary p-1" 
                    data-filter-id="{{ f.id }}" data-filter-name="{{ f.target_name }}" 
                    data-filter-query="{{ f.search_query }}" data-filter-category="{{ f.category.id|default:'' }}"
                    data-filter-cf="{{ f.linked_cash_flow.id|default:'' }}"
                    onclick="openEditModalFromButton(this)" title="{% trans 'Bearbeiten' %}">
                <i class="bi bi-pencil-square"></i>
            </button>
            <a href="{% url 'delete_import_filter' f.id %}?batch_id={{ batch_id }}" 
               class="btn btn-link text-danger p-1" title="{% trans 'Löschen' %}"
               onclick='return confirm("{% trans 'Filter wirklich löschen?' %}")'>
                <i class="bi bi-trash"></i>
            </a>
        </div>
    </td>
</tr>

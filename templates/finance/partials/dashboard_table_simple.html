{% load i18n humanize %}
<div x-data="{ 
    colFilters: { name: '', cat: '', year: '', amount: '' },
    sortCol: 'amount', 
    sortDir: 'desc',
    items: [],
    collapsedGroups: {},
    init() {
        const scriptTag = document.getElementById('{{ widget_id }}');
        if (scriptTag) {
            try {
                const data = JSON.parse(scriptTag.textContent);
                this.items = Array.isArray(data) ? data : [];
            } catch (e) {
                console.error('Error parsing table data:', e);
                this.items = [];
            }
        }
    },
    get filteredItems() {
        if (!this.items) return [];
        return this.items.filter(i => {
            const n = (i.name || '').toLowerCase();
            const f_n = (this.colFilters.name || '').toLowerCase();
            if (f_n && !n.includes(f_n)) return false;

            const c = (i.date || i.category || '').toLowerCase();
            const f_c = (this.colFilters.cat || '').toLowerCase();
            if (f_c && !c.includes(f_c)) return false;

            const y = (i.year || '').toString().toLowerCase();
            const f_y = (this.colFilters.year || '').toString().toLowerCase();
            if (f_y && !y.includes(f_y)) return false;

            const a = (i.amount || 0).toString();
            const f_a = (this.colFilters.amount || '').toString();
            if (f_a && !a.includes(f_a)) return false;

            return true;
        }).sort((a, b) => {
            // Primary sort by year
            if (a.year !== b.year) {
                const isAYear = /^\d+$/.test(a.year);
                const isBYear = /^\d+$/.test(b.year);
                if (!isAYear && isBYear) return -1;
                if (isAYear && !isBYear) return 1;
                return a.year.localeCompare(b.year);
            }
            // Secondary sort by user selected column
            let va = a[this.sortCol];
            let vb = b[this.sortCol];
            if (typeof va === 'string') {
                va = va.toLowerCase();
                vb = vb.toLowerCase();
            }
            if (va < vb) return this.sortDir === 'asc' ? -1 : 1;
            if (va > vb) return this.sortDir === 'asc' ? 1 : -1;
            return 0;
        });
    },
    get displayRows() {
        const sorted = this.filteredItems;
        const rows = [];
        let currentYear = null;
        
        const yearSums = {};
        sorted.forEach(i => {
            yearSums[i.year] = (yearSums[i.year] || 0) + (parseFloat(i.amount) || 0);
        });

        sorted.forEach(item => {
            if (item.year !== currentYear) {
                currentYear = item.year;
                rows.push({
                    isGroupHeader: true,
                    year: currentYear,
                    subtotal: yearSums[currentYear]
                });
            }
            if (!this.collapsedGroups[currentYear]) {
                rows.push({
                    isGroupHeader: false,
                    ...item
                });
            }
        });
        return rows;
    },
    get hasDate() {
        return this.items.some(i => i.date);
    },
    get total() {
        return this.filteredItems.reduce((sum, i) => sum + (parseFloat(i.amount) || 0), 0);
    }
}" class="h-100 d-flex flex-column" x-init="init()">
    
    <div class="flex-grow-1 overflow-auto px-2" style="max-height: 100%;">
        <table class="table table-sm table-hover align-middle mb-0" style="font-size: 0.85rem; color: inherit;">
            <thead class="sticky-top" style="z-index: 10;">
                <tr class="text-uppercase" style="font-size: 0.70rem;">
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'name'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: {{ table_config.header_bg_color }} !important; color: {{ table_config.header_text_color }} !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Name' %}</span>
                            <i class="bi" :class="sortCol === 'name' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = (hasDate ? 'date' : 'category'); sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: {{ table_config.header_bg_color }} !important; color: {{ table_config.header_text_color }} !important;">
                         <div class="d-flex align-items-center justify-content-between">
                            <span x-text="hasDate ? '{% trans 'Date' %}' : '{% trans 'Category' %}'"></span>
                            <i class="bi" :class="(sortCol === 'category' || sortCol === 'date') ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'year'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: {{ table_config.header_bg_color }} !important; color: {{ table_config.header_text_color }} !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Year' %}</span>
                            <i class="bi" :class="sortCol === 'year' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 text-end cursor-pointer" @click="sortCol = 'amount'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: {{ table_config.header_bg_color }} !important; color: {{ table_config.header_text_color }} !important;">
                        <div class="d-flex align-items-center justify-content-end">
                            <span class="me-1">{% trans 'Amount' %}</span>
                            <i class="bi" :class="sortCol === 'amount' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                </tr>
                <tr>
                    <td class="p-1 border-0" style="background-color: {{ table_config.filter_bg_color }} !important;">
                        <input type="text" x-model="colFilters.name" class="form-control form-control-xs py-0 border-secondary-subtle shadow-sm" style="font-size: 0.7rem; background-color: #ffffff;" placeholder="{% trans 'Filter...' %}">
                    </td>
                    <td class="p-1 border-0" style="background-color: {{ table_config.filter_bg_color }} !important;">
                        <input type="text" x-model="colFilters.cat" class="form-control form-control-xs py-0 border-secondary-subtle shadow-sm" style="font-size: 0.7rem; background-color: #ffffff;" placeholder="{% trans 'Filter...' %}">
                    </td>
                    <td class="p-1 border-0" style="background-color: {{ table_config.filter_bg_color }} !important;">
                        <input type="text" x-model="colFilters.year" class="form-control form-control-xs py-0 border-secondary-subtle shadow-sm text-center" style="font-size: 0.7rem; background-color: #ffffff;" placeholder="{% trans 'Filter...' %}">
                    </td>
                    <td class="p-1 border-0" style="background-color: {{ table_config.filter_bg_color }} !important;">
                        <input type="text" x-model="colFilters.amount" class="form-control form-control-xs py-0 text-end border-secondary-subtle shadow-sm" style="font-size: 0.7rem; background-color: #ffffff;" placeholder="{% trans 'Filter...' %}">
                    </td>
                </tr>
            </thead>
            <tbody>
                <template x-for="(row, idx) in displayRows" :key="'row-' + idx">
                    <tr :class="row.isGroupHeader ? 'bg-secondary-subtle border-top border-bottom cursor-pointer text-body-emphasis' : 'align-middle'"
                        @click="if(row.isGroupHeader) collapsedGroups[row.year] = !collapsedGroups[row.year]">
                        <template x-if="row.isGroupHeader">
                            <td class="p-2 border-0" colspan="3">
                                <i class="bi me-2 text-muted" :class="collapsedGroups[row.year] ? 'bi-chevron-right' : 'bi-chevron-down'"></i>
                                <span class="badge bg-secondary" style="font-size: 0.75rem;" x-text="row.year"></span>
                            </td>
                        </template>
                        <template x-if="row.isGroupHeader">
                            <td class="text-end p-2 border-0">
                                <div class="small text-muted text-uppercase" style="font-size: 0.6rem;">{% trans 'Group Sum' %}</div>
                                <div class="fw-bold text-dark h6 mb-0" x-text="new Intl.NumberFormat('de-DE', { style: 'currency', currency: '{{ currency }}' }).format(row.subtotal)"></div>
                            </td>
                        </template>

                        <template x-if="!row.isGroupHeader">
                            <td class="fw-medium text-truncate border-0" style="max-width: 150px;" :title="row.name" x-text="row.name"></td>
                        </template>
                        <template x-if="!row.isGroupHeader">
                            <td class="border-0">
                                <div class="d-flex flex-wrap gap-1">
                                    <span x-show="row.date" class="text-muted small" x-text="row.date"></span>
                                    <span x-show="!row.date" class="badge bg-light text-dark border" x-text="row.category"></span>
                                    <span x-show="row.type && row.type !== '{% trans 'Manual' %}'" class="badge bg-info-subtle text-info border-info-subtle" style="font-size: 0.6rem;" x-text="row.type"></span>
                                </div>
                            </td>
                        </template>
                        <template x-if="!row.isGroupHeader">
                            <td class="text-center text-muted border-0" style="font-size: 0.75rem" x-text="row.year"></td>
                        </template>
                        <template x-if="!row.isGroupHeader">
                            <td class="text-end fw-bold border-0" x-text="new Intl.NumberFormat('de-DE', { style: 'currency', currency: '{{ currency }}' }).format(row.amount)"></td>
                        </template>
                    </tr>
                </template>
                <tr x-show="filteredItems.length === 0">
                    <td colspan="4" class="text-center text-muted py-4">{% trans 'No items found' %}</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="mt-auto border-top p-2 bg-light rounded-bottom d-flex justify-content-between align-items-center">
        <span class="small fw-bold text-muted text-uppercase">{% trans 'Total' %}</span>
        <span class="fw-bold text-primary" x-text="new Intl.NumberFormat('de-DE', { style: 'currency', currency: '{{ currency }}' }).format(total)"></span>
    </div>
</div>

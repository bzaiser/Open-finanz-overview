{% load i18n humanize %}
<div x-data="{ 
    colFilters: { name: '', cat: '', year: '', amount: '' },
    sortCol: 'amount', 
    sortDir: 'desc',
    items: [],
    collapsedGroups: {},
    init() {
        const scriptTag = document.getElementById('{{ widget_id }}');
        if (scriptTag) {
            try {
                const data = JSON.parse(scriptTag.textContent);
                this.items = Array.isArray(data) ? data : [];
            } catch (e) {
                console.error('Error parsing table data:', e);
                this.items = [];
            }
        }
    },
    get filteredItems() {
        if (!this.items) return [];
        return this.items.filter(i => {
            const n = (i.name || '').toLowerCase();
            const f_n = (this.colFilters.name || '').toLowerCase();
            if (f_n && !n.includes(f_n)) return false;

            const c = (i.date || i.category || '').toLowerCase();
            const f_c = (this.colFilters.cat || '').toLowerCase();
            if (f_c && !c.includes(f_c)) return false;

            const y = (i.year || '').toString().toLowerCase();
            const f_y = (this.colFilters.year || '').toString().toLowerCase();
            if (f_y && !y.includes(f_y)) return false;

            const a = (i.amount || 0).toString();
            const f_a = (this.colFilters.amount || '').toString();
            if (f_a && !a.includes(f_a)) return false;

            return true;
        }).sort((a, b) => {
            // Primary sort by year
            if (a.year !== b.year) {
                const isAYear = /^\d+$/.test(a.year);
                const isBYear = /^\d+$/.test(b.year);
                if (!isAYear && isBYear) return -1;
                if (isAYear && !isBYear) return 1;
                return a.year.localeCompare(b.year);
            }
            // Secondary sort by user selected column
            let va = a[this.sortCol];
            let vb = b[this.sortCol];
            if (typeof va === 'string') {
                va = va.toLowerCase();
                vb = vb.toLowerCase();
            }
            if (va < vb) return this.sortDir === 'asc' ? -1 : 1;
            if (va > vb) return this.sortDir === 'asc' ? 1 : -1;
            return 0;
        });
    },
    get total() {
        return this.filteredItems.reduce((sum, i) => sum + (parseFloat(i.amount) || 0), 0);
    }
}" class="h-100 d-flex flex-column" x-init="init()" style="background-color: var(--app-table-body-bg) !important;">
    
    <div class="flex-grow-1 overflow-auto px-0" style="background-color: var(--app-table-body-bg) !important;">
        <table class="table table-sm table-hover align-middle mb-0" 
               style="font-size: 0.82rem; border-color: var(--app-table-border-color) !important; --bs-table-bg: var(--app-table-body-bg); --bs-table-color: var(--app-table-body-text);">
            <thead class="sticky-top" style="z-index: 10;">
                <tr class="text-uppercase" style="font-size: 0.65rem;">
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'name'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Name' %}</span>
                            <i class="bi" :class="sortCol === 'name' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'category'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Category/Date' %}</span>
                            <i class="bi" :class="sortCol === 'category' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 cursor-pointer" @click="sortCol = 'year'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Year' %}</span>
                            <i class="bi" :class="sortCol === 'year' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                    <th class="py-2 px-3 border-0 text-end cursor-pointer" @click="sortCol = 'amount'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'"
                        style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important;">
                        <div class="d-flex align-items-center justify-content-end">
                            <span class="me-2">{% trans 'Amount' %}</span>
                            <i class="bi" :class="sortCol === 'amount' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up opacity-50'"></i>
                        </div>
                    </th>
                </tr>
                <!-- Inline Filters -->
                <tr>
                    <td class="p-1 px-3 border-0" style="background-color: var(--app-table-filter-bg) !important;">
                        <input type="text" x-model="colFilters.name" class="form-control form-control-sm border-0 bg-white bg-opacity-10 text-white" style="font-size: 0.75rem;" placeholder="Filter...">
                    </td>
                    <td class="p-1 border-0" style="background-color: var(--app-table-filter-bg) !important;">
                        <input type="text" x-model="colFilters.cat" class="form-control form-control-sm border-0 bg-white bg-opacity-10 text-white" style="font-size: 0.75rem;" placeholder="Filter...">
                    </td>
                    <td class="p-1 border-0" style="background-color: var(--app-table-filter-bg) !important;">
                        <input type="text" x-model="colFilters.year" class="form-control form-control-sm border-0 bg-white bg-opacity-10 text-white" style="font-size: 0.75rem;" placeholder="Jahr...">
                    </td>
                    <td class="p-1 px-3 border-0" style="background-color: var(--app-table-filter-bg) !important;">
                        <input type="text" x-model="colFilters.amount" class="form-control form-control-sm border-0 bg-white bg-opacity-10 text-white text-end" style="font-size: 0.75rem;" placeholder="{% trans 'Amount' %}...">
                    </td>
                </tr>
            </thead>
            <tbody style="border-top: 1px solid var(--app-table-border-color) !important;">
                <template x-for="(item, index) in filteredItems" :key="index">
                    <tr>
                        <td class="py-2 px-3 border-0" x-text="item.name"></td>
                        <td class="py-2 px-3 border-0">
                            <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill mb-1 d-block" style="font-size: 0.65rem;" x-text="item.category"></span>
                            <span class="small opacity-75 d-block" style="font-size: 0.65rem;" x-text="item.date"></span>
                        </td>
                        <td class="py-2 px-3 border-0 font-monospace text-center" style="font-size: 0.7rem;" x-text="item.year"></td>
                        <td class="py-2 px-3 border-0 text-end font-monospace fw-bold" 
                            :class="item.amount < 0 ? 'text-danger' : 'text-success'"
                            x-text="(item.amount || 0).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' })">
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- Summary Footer -->
    <div class="p-3 d-flex justify-content-between align-items-center" 
         style="background-color: var(--app-table-header-bg) !important; color: var(--app-table-header-text) !important; border-top-color: var(--app-table-border-color) !important;">
        <span class="small opacity-75 text-uppercase fw-bold" style="letter-spacing: 0.05rem;">
            {% trans 'Total' %} (<span x-text="filteredItems.length"></span>)
        </span>
        <span class="fs-5 fw-bold font-monospace" x-text="total.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' })"></span>
    </div>
</div>

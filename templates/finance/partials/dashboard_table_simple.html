{% load i18n humanize %}
<div x-data="{ 
    colFilters: { name: '', cat: '', amount: '' },
    sortCol: 'amount', 
    sortDir: 'desc',
    items: [],
    init() {
        const scriptTag = document.getElementById('{{ widget_id }}');
        if (scriptTag) {
            try {
                const data = JSON.parse(scriptTag.textContent);
                this.items = Array.isArray(data) ? data : [];
            } catch (e) {
                console.error('Error parsing table data:', e);
                this.items = [];
            }
        }
    },
    get filteredItems() {
        if (!this.items) return [];
        return this.items.filter(i => {
            const n = (i.name || '').toLowerCase();
            const f_n = (this.colFilters.name || '').toLowerCase();
            if (f_n && !n.includes(f_n)) return false;

            const c = (i.date || i.category || '').toLowerCase();
            const f_c = (this.colFilters.cat || '').toLowerCase();
            if (f_c && !c.includes(f_c)) return false;

            const a = (i.amount || 0).toString();
            const f_a = (this.colFilters.amount || '').toString();
            if (f_a && !a.includes(f_a)) return false;

            return true;
        }).sort((a, b) => {
            let va = a[this.sortCol];
            let vb = b[this.sortCol];
            if (typeof va === 'string') {
                va = va.toLowerCase();
                vb = vb.toLowerCase();
            }
            if (va < vb) return this.sortDir === 'asc' ? -1 : 1;
            if (va > vb) return this.sortDir === 'asc' ? 1 : -1;
            return 0;
        });
    },
    get total() {
        return this.filteredItems.reduce((sum, i) => sum + (parseFloat(i.amount) || 0), 0);
    }
}" class="h-100 d-flex flex-column" x-init="init()">
    
    <div class="flex-grow-1 overflow-auto px-2" style="max-height: 100%;">
        <table class="table table-sm table-hover align-middle mb-0" style="font-size: 0.85rem; color: inherit;">
            <thead class="sticky-top bg-white" style="z-index: 10;">
                <tr class="text-muted text-uppercase" style="font-size: 0.7rem;">
                    <th class="border-0 cursor-pointer" @click="sortCol = 'name'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>{% trans 'Name' %}</span>
                            <i class="bi" :class="sortCol === 'name' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-hash'"></i>
                        </div>
                    </th>
                    <th class="border-0 cursor-pointer" @click="sortCol = 'date'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'">
                         <div class="d-flex align-items-center justify-content-between">
                            <template x-if="items.some(i => i.date)">
                                <span>{% trans 'Date' %}</span>
                            </template>
                            <template x-if="!items.some(i => i.date)">
                                <span>{% trans 'Category' %}</span>
                            </template>
                            <i class="bi" :class="(sortCol === 'category' || sortCol === 'date') ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-hash'"></i>
                        </div>
                    </th>
                    <th class="border-0 text-end cursor-pointer" @click="sortCol = 'amount'; sortDir = sortDir === 'asc' ? 'desc' : 'asc'">
                        <div class="d-flex align-items-center justify-content-end">
                            <span class="me-1">{% trans 'Amount' %}</span>
                            <i class="bi" :class="sortCol === 'amount' ? (sortDir === 'asc' ? 'bi-sort-up' : 'bi-sort-down') : 'bi-hash'"></i>
                        </div>
                    </th>
                </tr>
                <tr class="bg-light">
                    <td class="p-1 border-0">
                        <input type="text" x-model="colFilters.name" class="form-control form-control-xs py-0" style="font-size: 0.7rem;" placeholder="{% trans 'Filter...' %}">
                    </td>
                    <td class="p-1 border-0">
                        <input type="text" x-model="colFilters.cat" class="form-control form-control-xs py-0" style="font-size: 0.7rem;" placeholder="{% trans 'Filter...' %}">
                    </td>
                    <td class="p-1 border-0">
                        <input type="text" x-model="colFilters.amount" class="form-control form-control-xs py-0 text-end" style="font-size: 0.7rem;" placeholder="{% trans 'Filter...' %}">
                    </td>
                </tr>
            </thead>
            <tbody>
                <template x-for="(item, index) in filteredItems" :key="index + item.name + item.amount">
                    <tr>
                        <td class="fw-medium text-truncate" style="max-width: 150px;" :title="item.name" x-text="item.name"></td>
                        <td>
                            <div class="d-flex flex-wrap gap-1">
                                <span x-show="item.date" class="text-muted small" x-text="item.date"></span>
                                <span x-show="!item.date" class="badge bg-light text-dark border" x-text="item.category"></span>
                                <span x-show="item.type && item.type !== '{% trans 'Manual' %}'" class="badge bg-info-subtle text-info border-info-subtle" style="font-size: 0.6rem;" x-text="item.type"></span>
                            </div>
                        </td>
                        <td class="text-end fw-bold" x-text="new Intl.NumberFormat('de-DE', { style: 'currency', currency: '{{ currency }}' }).format(item.amount)"></td>
                    </tr>
                </template>
                <tr x-show="filteredItems.length === 0">
                    <td colspan="3" class="text-center text-muted py-4">{% trans 'No items found' %}</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="mt-auto border-top p-2 bg-light rounded-bottom d-flex justify-content-between align-items-center">
        <span class="small fw-bold text-muted text-uppercase">{% trans 'Total' %}</span>
        <span class="fw-bold text-primary" x-text="new Intl.NumberFormat('de-DE', { style: 'currency', currency: '{{ currency }}' }).format(total)"></span>
    </div>
</div>

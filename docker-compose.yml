version: '3.8'

services:
  web:
    container_name: ${CONTAINER_NAME:-finanzplan-web}
    image: ${IMAGE_NAME:-finanzplan-image}
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./:/app
      - static_volume:/app/staticfiles
    env_file:
      - ./.env
    environment:
      - "DEBUG=${DEBUG:-False}"
      - "SECRET_KEY=change_this_to_a_secure_long_random_string_in_production!"
      - "ALLOWED_HOSTS=*"
      - "RUNNING_IN_DOCKER=1"
      - "OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}"
      - "OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}"
      - "LLM_PROVIDER=${LLM_PROVIDER:-hybrid}"

volumes:
  static_volume:

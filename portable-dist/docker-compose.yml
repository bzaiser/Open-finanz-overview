version: '3.8'

services:
  web:
    container_name: finanzplan-portable
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./data/media:/app/media
      - ./data/static:/app/staticfiles
    environment:
      - "DEBUG=False"
      - "SECRET_KEY=${SECRET_KEY:-portable_secret_key}"
      - "ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}"
      - "RUNNING_IN_DOCKER=1"
      - "LLM_PROVIDER=${LLM_PROVIDER:-none}"
    env_file:
      - .env

version: '3.8'

services:
  web:
    container_name: ${CONTAINER_NAME:-finanzplan-web}
    image: ${IMAGE_NAME:-finanzplan-image}
    build: 
      context: ../
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ../data:/app/data
      - ../:/app
      - static_volume:/app/staticfiles
    env_file:
      - ../.env
    environment:
      - "DEBUG=${DEBUG:-False}"
      - "SECRET_KEY=change_this_to_a_secure_long_random_string_in_production!"
      - "ALLOWED_HOSTS=*"
      - "RUNNING_IN_DOCKER=1"
      - "OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}"
      - "OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}"
      - "LLM_PROVIDER=${LLM_PROVIDER:-hybrid}"

  ollama:
    image: ollama/ollama:latest
    container_name: ${CONTAINER_NAME:-finanzplan-web}_ollama
    volumes:
      - ../data/ollama:/root/.ollama
    restart: always

  db-browser:
    image: coleifer/sqlite-web
    container_name: ${CONTAINER_NAME:-finanzplan-web}_db_browser
    volumes:
      - ../data:/data
    ports:
      - "${DB_BROWSER_PORT:-8080}:8080"
    environment:
      - SQLITE_DATABASE=db.sqlite3
    command: /data/db.sqlite3
    restart: always

volumes:
  static_volume:

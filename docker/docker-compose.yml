version: '3.8'

services:
  web:
    build: 
      context: ../
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "8000:8000"  # Exposes the server to port 8000. Change left side (e.g. "80:8000") to expose on default web port
    volumes:
      - ../data:/app/data
      - ../:/app
      - static_volume:/app/staticfiles
    env_file:
      - ../.env
    environment:
      - "DEBUG=${DEBUG:-False}"
      - "SECRET_KEY=change_this_to_a_secure_long_random_string_in_production!"
      - "ALLOWED_HOSTS=*"
      - "RUNNING_IN_DOCKER=1"

volumes:
  static_volume:
